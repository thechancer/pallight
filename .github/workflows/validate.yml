name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"

      - name: Install hassfest dependencies
        run: pip install homeassistant

      - name: Lint Python
        run: |
          pip install flake8
          flake8 custom_components/pallight/ \
            --max-line-length=120 \
            --exclude=__pycache__ \
            --ignore=E501,W503

      - name: Validate manifest
        run: |
          python -c "
          import json, sys
          with open('custom_components/pallight/manifest.json') as f:
              m = json.load(f)
          required = ['domain','name','version','documentation','requirements','codeowners','iot_class']
          missing = [k for k in required if k not in m]
          if missing:
              print('Missing manifest keys:', missing)
              sys.exit(1)
          print('manifest.json OK — version', m['version'])
          "

      - name: Syntax check all Python files
        run: |
          python -m py_compile custom_components/pallight/*.py
          python -m py_compile custom_components/pallight/frontend/*.py
          echo "All Python files syntax OK"

      - name: HACS validation
        uses: hacs/action@main
        with:
          category: integration
